<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TELEPROMTR</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="app" class="window-frame" aria-label="TELEPROMTR">
      <section id="scrollport" class="scrollport">
        <div id="transformSurface" class="transform-surface">
          <div
            id="editor"
            class="editor"
            contenteditable="true"
            spellcheck="false"
            aria-label="Script editor"
          ></div>
        </div>
      </section>

      <div id="countdown" class="countdown" hidden></div>

      <button id="playToggle" class="play-toggle chrome-control" type="button" aria-label="Play or pause">
        <span class="play-icon" aria-hidden="true"></span>
      </button>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
