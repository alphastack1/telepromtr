<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TELEPROMTR Settings</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="menu-shell" aria-label="TELEPROMTR settings">
      <header class="menu-head">
        <div>
          <div class="brand">TELEPROMTR</div>
          <div id="menuStatus" class="status">Paused</div>
        </div>
        <div class="menu-head-actions">
          <button id="playToggle" class="primary-button" type="button">Play</button>
          <button id="closeApp" class="close-button" type="button" aria-label="Close TELEPROMTR">Close</button>
        </div>
      </header>

      <section class="menu-content">
        <section class="menu-section">
          <div class="section-title">Playback</div>
          <div class="section-grid">
            <label class="field wide">
              <span>Speed <output id="speedValue"></output></span>
              <input id="speed" type="range" min="1" max="140" step="1" />
            </label>

            <label class="field">
              <span>Countdown <output id="countdownSecondsValue"></output></span>
              <input id="countdownSeconds" type="range" min="0" max="10" step="1" />
            </label>

            <label class="toggle">
              <input id="loop" type="checkbox" />
              <span>Loop</span>
            </label>
          </div>
        </section>

        <section class="menu-section">
          <div class="section-title">Reading</div>
          <div class="section-grid">
            <label class="toggle wide">
              <input id="autoFit" type="checkbox" />
              <span>Fit lines to window</span>
            </label>

            <label class="field">
              <span>Lines <output id="visibleLinesValue"></output></span>
              <input id="visibleLines" type="range" min="2" max="9" step="1" />
            </label>

            <label class="field">
              <span>Size <output id="fontSizeValue"></output></span>
              <input id="fontSize" type="range" min="16" max="120" step="1" />
            </label>

            <label class="field">
              <span>Line <output id="lineHeightValue"></output></span>
              <input id="lineHeight" type="range" min="0.9" max="1.8" step="0.01" />
            </label>

            <label class="field">
              <span>Paragraph <output id="paragraphSpacingValue"></output></span>
              <input id="paragraphSpacing" type="range" min="0" max="1.6" step="0.05" />
            </label>

            <label class="field">
              <span>Tracking <output id="letterSpacingValue"></output></span>
              <input id="letterSpacing" type="range" min="0" max="6" step="0.1" />
            </label>

            <div class="field">
              <span>Align</span>
              <div class="segmented" role="group" aria-label="Text alignment">
                <button class="align-button" type="button" data-align="left">L</button>
                <button class="align-button" type="button" data-align="center">C</button>
                <button class="align-button" type="button" data-align="right">R</button>
                <button class="align-button" type="button" data-align="justify">J</button>
              </div>
            </div>
          </div>
        </section>

        <section class="menu-section">
          <div class="section-title">Appearance</div>
          <div class="section-grid">
            <label class="field wide">
              <span>Font</span>
              <select id="fontFamily">
                <option value="system-ui, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif">
                  System
                </option>
                <option value="Arial, Helvetica, sans-serif">Arial</option>
                <option value="Tahoma, Geneva, sans-serif">Tahoma</option>
                <option value="Verdana, Geneva, sans-serif">Verdana</option>
                <option value="Georgia, serif">Georgia</option>
                <option value="&quot;Courier New&quot;, Courier, monospace">Courier</option>
              </select>
            </label>

            <div class="field">
              <span>Style</span>
              <div class="segmented" role="group" aria-label="Text style">
                <button id="bold" type="button"><b>B</b></button>
                <button id="italic" type="button"><i>I</i></button>
                <button id="underline" type="button"><u>U</u></button>
              </div>
            </div>

            <div class="inline-toggles">
              <label class="toggle compact">
                <input id="mirrorX" type="checkbox" />
                <span>Flip H</span>
              </label>

              <label class="toggle compact">
                <input id="mirrorY" type="checkbox" />
                <span>Flip V</span>
              </label>
            </div>

            <label class="swatch">
              <span>Text</span>
              <input id="textColor" type="color" />
            </label>

            <label class="swatch">
              <span>Back</span>
              <input id="backgroundColor" type="color" />
            </label>

            <label class="swatch">
              <span>Line</span>
              <input id="borderColor" type="color" />
            </label>
          </div>
        </section>

        <section class="menu-section">
          <div class="section-title">Window & Script</div>
          <div class="section-grid">
            <label class="field wide">
              <span>Window <output id="windowOpacityValue"></output></span>
              <input id="windowOpacity" type="range" min="0.45" max="1" step="0.01" />
            </label>

            <label class="toggle wide">
              <input id="alwaysOnTop" type="checkbox" />
              <span>Always on top</span>
            </label>
          </div>

          <footer class="menu-actions">
            <button id="newScript" type="button">New</button>
            <button id="openScript" type="button">Open</button>
            <button id="exportScript" type="button">Export</button>
            <button id="resetWindow" type="button">Reset</button>
          </footer>
        </section>
      </section>
    </main>

    <script src="./menu.js"></script>
  </body>
</html>
