<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; media-src 'self' blob:; connect-src 'self'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>TELEPROMTR</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="app" class="mobile-app mode-black">
      <video id="camera" class="camera-feed" autoplay muted playsinline hidden></video>

      <section id="promptBox" class="prompt-box" aria-label="Teleprompter">
        <div id="scrollport" class="scrollport">
          <div
            id="editor"
            class="editor"
            contenteditable="true"
            spellcheck="false"
            aria-label="Script editor"
          ></div>
        </div>
      </section>

      <div id="countdown" class="countdown" hidden></div>

      <nav class="bottom-bar" aria-label="Prompt controls">
        <button id="playToggle" class="round-control primary" type="button" aria-label="Play">
          <span class="play-icon" aria-hidden="true"></span>
        </button>
        <button id="recordToggle" class="round-control record-control" type="button" aria-label="Start recording">
          <span class="record-dot" aria-hidden="true"></span>
        </button>
        <button id="cameraToggle" class="text-control" type="button">Camera</button>
        <button id="settingsToggle" class="text-control" type="button">Settings</button>
      </nav>

      <aside id="settingsSheet" class="settings-sheet" aria-label="Settings" hidden>
        <header class="sheet-head">
          <div>
            <div class="brand">TELEPROMTR</div>
            <div id="status">Paused</div>
          </div>
          <button id="closeSettings" class="round-control" type="button" aria-label="Close settings">x</button>
        </header>

        <section class="sheet-content">
          <section class="sheet-section">
            <div class="section-title">Playback</div>
            <label class="field">
              <span>Speed <output id="speedValue"></output></span>
              <input id="speed" type="range" min="1" max="140" step="1" />
            </label>
            <label class="field">
              <span>Countdown <output id="countdownSecondsValue"></output></span>
              <input id="countdownSeconds" type="range" min="0" max="10" step="1" />
            </label>
            <label class="toggle">
              <input id="loop" type="checkbox" />
              <span>Loop</span>
            </label>
          </section>

          <section class="sheet-section">
            <div class="section-title">Reading</div>
            <label class="toggle">
              <input id="autoFit" type="checkbox" />
              <span>Fit lines to box</span>
            </label>
            <div class="field-row">
              <label class="field">
                <span>Lines <output id="visibleLinesValue"></output></span>
                <input id="visibleLines" type="range" min="2" max="9" step="1" />
              </label>
              <label class="field">
                <span>Size <output id="fontSizeValue"></output></span>
                <input id="fontSize" type="range" min="16" max="92" step="1" />
              </label>
            </div>
            <div class="field-row">
              <label class="field">
                <span>Line <output id="lineHeightValue"></output></span>
                <input id="lineHeight" type="range" min="0.9" max="1.8" step="0.01" />
              </label>
              <label class="field">
                <span>Box <output id="boxHeightValue"></output></span>
                <input id="boxHeight" type="range" min="16" max="72" step="1" />
              </label>
            </div>
          </section>

          <section class="sheet-section">
            <div class="section-title">Look</div>
            <div class="field-row">
              <label class="swatch">
                <span>Text</span>
                <input id="textColor" type="color" />
              </label>
              <label class="swatch">
                <span>Back</span>
                <input id="backgroundColor" type="color" />
              </label>
              <label class="swatch">
                <span>Line</span>
                <input id="borderColor" type="color" />
              </label>
            </div>
            <div class="field-row">
              <label class="toggle">
                <input id="mirrorX" type="checkbox" />
                <span>Mirror text</span>
              </label>
              <label class="toggle">
                <input id="cameraMirror" type="checkbox" />
                <span>Mirror camera</span>
              </label>
            </div>
          </section>
        </section>
      </aside>
    </main>

    <script src="./mobile.js"></script>
  </body>
</html>
